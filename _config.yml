title: "toopazo"
author: "Tomás Opazo"
description: "Mi nombre es Tomás Opazo, chileno, casado y padre de un retoño. 
El 2021 me gradué como PhD en Ing Aeroespacial en PennState (PA, EEUU), 
allí me especialicé en optimización de sistemas dinámicos 
y control de UAV (aviones no tripulados). Actualmente vivo en Santiago y trabajo en 
una empresa de IA para el retail. Mi linea de trabajo es visión computacional y 
reconocimiento de acciones (action recognition). En este blog escribo acerca de cosas 
de mi trabajo y otros temas personales."
permalink: /:title/
lang: "es"
excerpt_separator: "\n\n\n"
date_format: "%d %m, %Y"

# Collections

collections:
  academico:
    output: true
    permalink: /academico/:title/
    sort_by: date
  ingenieria:
    output: true
    permalink: /ingenieria/:title/
    sort_by: date
  personal:
    output: true
    permalink: /personal/:title/
    sort_by: date

defaults:
  - scope: {path: "", type: academico}
    values: {layout: capsule}
  - scope: {path: "", type: ingenieria}
    values: {layout: capsule}
  - scope: {path: "", type: personal}
    values: {layout: capsule}

# Layout

show_excerpts: false       # home page is now the hub
show_frame: true           # adds a gray frame to the site
show_sidebar: false        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu

navigation:                # accepts {file, title, url, icon, sidebaricon}
  - {file: "index.html",     title: "Inicio"}
  - {file: "academico.html", title: "Académico"}
  - {file: "ingenieria.html",title: "Ingeniería"}
  - {file: "personal.html",  title: "Personal"}
  - {file: "about.md",       title: "Contacto"}

external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: "mailto:toopazo@proton.me"}
  - {title: Github, icon: github, url: "https://github.com/toopazo"}
  - {title: Subscribe, icon: rss, url: "/feed.xml"}

comments:
#  disqus_shortname: ""    # see https://disqus.com/
#  isso_domain: ""         # see https://posativ.org/isso/

plugins:
 - jekyll-feed

exclude:
  - excluded
