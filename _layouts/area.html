---
layout: default
---
<article class="area-{{ page.area_id }}">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </header>
  {% assign capsules = site[page.collection] | sort: "date" | reverse %}
  <div class="card-grid">
    {% for capsule in capsules %}
      {% include card.html capsule=capsule %}
    {% endfor %}
  </div>
</article>
